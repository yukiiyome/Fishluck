{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FishLuck</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>🐟</text></svg>">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'diary/styles.css' %}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark mb-4">
    <div class="container d-flex justify-content-between">
        <a class="navbar-brand" href="{% url 'home' %}">FishLuck</a>
        <div class="d-flex align-items-center flex-wrap">
            <a class="text-white me-3" href="{% url 'calculator' %}"><span class="nav-icon">🧮</span>Калькулятор</a>
            {% if user.is_authenticated %}
                <a class="text-white me-3" href="{% url 'dashboard' %}"><span class="nav-icon">📊</span>Журнал</a>
                <a class="text-white me-3" href="{% url 'spot_add' %}"><span class="nav-icon">📍</span>Водоём</a>
                <a class="text-white me-3" href="{% url 'trip_add' %}"><span class="nav-icon">🎣</span>Выезд</a>
                <form method="post" action="{% url 'logout' %}" class="d-inline m-0">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-link text-white p-0 align-baseline" style="text-decoration:none;"><span class="nav-icon">🚪</span>Выйти ({{ user.username }})</button>
                </form>
            {% else %}
                <a class="text-white me-3" href="{% url 'login' %}"><span class="nav-icon">🔑</span>Войти</a>
                <a class="text-white" href="{% url 'register' %}"><span class="nav-icon">✨</span>Регистрация</a>
            {% endif %}
        </div>
    </div>
</nav>
<div class="container">
    {% block content %}{% endblock %}
</div>
</body>
</html>
